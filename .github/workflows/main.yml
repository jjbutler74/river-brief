name: Friday River Brief 2.0

on:
  schedule:
    # 7:00 AM NZT (NZST) = 19:00 UTC Thursday
    # In NZDT (Oct–Apr) 7:00 AM = 18:00 UTC Thursday
    # This runs at 18:00 UTC Thursday which is 7 AM Friday NZDT (summer) and 6 AM NZST (winter)
    # Adjust the hour here if you want a different time
    - cron: "0 18 * * 4"

  # Allows you to run this manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Run river brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python river_brief.py
